name: Poings de fer
type: capacity
img: icons/skills/melee/unarmed-punch-fist-yellow-red.webp
system:
  description: >-
    <p>Lorsqu’il combat à mains nues, le moine peut (s’il le souhaite) remplacer
    sa FOR par son AGI pour ses tests d’attaque au contact et il inflige
    [1d6+FOR] DM létaux (Voir « DM temporaires » page 219). Ces DM augmentent à
    chaque rang suivant : 1d8 au rang 2, 1d10 au rang 3, 1d12 au rang 4 et enfin
    2d6 au rang 5.</p>
  inGame: >-
    <p>La première action « Attaque avec AGI » est un buff activable qui permet
    de substituer l'AGI à la FOR pour le test d'attaque au contact. La seconde
    action « Frappe » remplace l'attaque de base « Mains Nues » : elle inflige
    des DM progressifs selon le rang dans la voie (1d6 au rang 1, 1d8 au rang 2,
    1d10 au rang 3, 1d12 au rang 4, 2d6 au rang 5) + modificateur de FOR. Il
    n'est pas nécessaire de modifier l'équipement Mains Nues.</p>
