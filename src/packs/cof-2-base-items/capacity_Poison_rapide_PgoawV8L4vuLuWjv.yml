system:
  description: >-
    <p>Le personnage sait fabriquer du poison « rapide » en petite quantité.
    Avant chaque combat, ses armes (trois au maximum) sont enduites de ce
    poison. La première attaque réussie provoque 3d4° DM supplémentaires. Si la
    victime réussit un test de CON difficulté [10 + INT], elle ne subit que la
    moitié des DM.</p>
  inGame: >-
    <p>Le joueur effectue l'attaque avec son arme équipée normalement, puis
    utilise cette action sur la cible touchée pour lancer les DM du poison
    (3d4°) et demander un test de sauvegarde de CON. En cas de réussite, les DM
    du poison sont divisés par 2.</p>
