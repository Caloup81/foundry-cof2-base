system:
  description: >-
    <p style="text-align:justify">Des flammes jaillissent des doigts tendus du
    magicien. Jusqu’à 3 cibles au contact subissent [1d4°+INT] DM, les cibles
    peuvent faire un test d’AGI difficulté [10 + INT] pour ne subir que la
    moitié des DM. Les DM passent à 2d4° au rang 4.</p>
  inGame: >-
    <p>Le joueur sélectionne jusqu'à 3 cibles au contact puis clique sur
    l'action pour lancer le sort qui va lancer les dommages et demander un test
    de sauvegarde d'AGI. En cas de réussite, les DM sont divisés par 2.</p>
